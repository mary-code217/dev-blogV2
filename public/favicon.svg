<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <style>
    .bracket { fill: #6366f1; }
    .slash { fill: #a5b4fc; }
    @media (prefers-color-scheme: dark) {
      .bracket { fill: #818cf8; }
      .slash { fill: #c7d2fe; }
    }
  </style>
  <text x="64" y="82" font-family="monospace" font-weight="bold" font-size="72" text-anchor="middle">
    <tspan class="bracket">&lt;</tspan><tspan class="slash">/</tspan><tspan class="bracket">&gt;</tspan>
  </text>
</svg>
