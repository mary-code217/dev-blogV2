<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <style>
    .bracket { fill: #6366f1; }
    .slash { fill: #a5b4fc; }
    @media (prefers-color-scheme: dark) {
      .bracket { fill: #818cf8; }
      .slash { fill: #c7d2fe; }
    }
  </style>
  <!-- < -->
  <polygon class="bracket" points="8,64 48,30 48,44 26,64 48,84 48,98"/>
  <!-- / -->
  <polygon class="slash" points="72,20 80,20 56,108 48,108"/>
  <!-- > -->
  <polygon class="bracket" points="120,64 80,30 80,44 102,64 80,84 80,98"/>
</svg>
